                moralita: { S045: 2.5, S049: 2, S040: -1.5, S046: -1.5, S029: -1 },
                superiorita: { S029: 2, S019: 2, S013: 1.5, S001: -1, S004: -1 },
                sicurezza: { S002: 2, S008: 2, S024: 1.5, S045: 1.5, S019: 1 }
            };
            
            let punteggi = {};
            Object.keys(pesi).forEach(tratto => {
                let totale = 0, massimo = 0;
                Object.entries(pesi[tratto]).forEach(([segnale, peso]) => {
                    const s = SEGNALI.find(s => s.id === segnale);
                    const valore = selected.has(segnale) ? (s?.peso || 1) : 0;
                    if (peso > 0) { totale += valore * peso; massimo += 4 * peso; }
                    else { totale -= valore * Math.abs(peso); massimo += 4 * Math.abs(peso); }
                });
                punteggi[tratto] = massimo > 0 ? Math.min(100, Math.max(0, Math.round((totale / massimo) * 100))) : 0;
            });
            return punteggi;
        }

        function getIdentitaDominante(punteggi) {
            let max = 0, dominante = 'neutro';
            Object.entries(punteggi).forEach(([tratto, val]) => { if (val > max) { max = val; dominante = tratto; } });
            let livello = 'basso';
            if (max >= 70) livello = 'alto';
            else if (max >= 40) livello = 'medio';
            return { dominante, livello, punteggio: max };
        }

        function renderIdentita(punteggi, dominante) {
            document.getElementById('identita-dominante').innerText = `${dominante.dominante} (${dominante.livello})`;
            
            const colori = {
                competenza: '#3498db',
                intelligenza: '#9b59b6',
                status: '#f1c40f',
                indipendenza: '#e67e22',
                moralita: '#2ecc71',
                superiorita: '#e74c3c',
                sicurezza: '#1abc9c'
            };
            
            let html = '';
            Object.entries(punteggi).forEach(([tratto, valore]) => {
                html += `
                    <div class="identita-item">
                        <div class="identita-label">${tratto}</div>
                        <div class="identita-valore" style="color:${colori[tratto]}">${valore}%</div>
                        <div class="identita-bar-bg">
                            <div class="identita-bar-fill" style="width:${valore}%; background:${colori[tratto]};"></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('identita-grid').innerHTML = html;
        }

        // ==================== ANALISI ====================
        function analizza() {
            if (selected.size === 0) {
                alert('Seleziona almeno un segnale');
                return;
            }

            // Calcolo canali
            let canali = { NV: 0, PV: 0, V: 0 };
            let conteggi = { NV: 0, PV: 0, V: 0 };
            
            selected.forEach(id => {
                const s = SEGNALI.find(s => s.id === id);
                if (!s) return;
                if (s.zona === "NV") { canali.NV += s.peso; conteggi.NV++; }
                if (s.zona === "PV") { canali.PV += s.peso; conteggi.PV++; }
                if (s.zona === "V") { canali.V += s.peso; conteggi.V++; }
            });

            // Calcolo pattern
            let risultati = [];
            let vettori = { apertura: 0, fuga: 0, controllo: 0, approccio: 0 };
            
            const ctx = CONTESTI[document.getElementById('ctx').value] || CONTESTI.NEGOZIALE;

            PATTERN_LIBRARY.forEach(p => {
                let score = 0;
                let max = 0;
                p.segnali.forEach(id => {
                    const s = SEGNALI.find(s => s.id === id);
                    if (!s) return;
                    max += s.peso;
                    if (selected.has(id)) score += s.peso;
                });
                
                if (max > 0) {
                    let prob = (score / max) * 100;
                    if (ctx.focus.includes(p.cluster)) {
                        prob *= ctx.moltiplicatore;
                    }
                    if (prob > 15) {
                        risultati.push({ 
                            nome: p.nome, 
                            prob: Math.min(Math.round(prob), 100), 
                            direzione: p.direzione 
                        });
                        if (vettori[p.direzione] !== undefined) {
                            vettori[p.direzione] += prob;
                        }
                    }
                }
            });

            risultati.sort((a, b) => b.prob - a.prob);
            
            let direzione = 'neutrale';
            let maxVettore = 0;
            Object.entries(vettori).forEach(([dir, val]) => {
                if (val > maxVettore) { maxVettore = val; direzione = dir; }
            });

            // Intensità
            const totalePesi = canali.NV + canali.PV + canali.V;
            const intensita = selected.size > 0 ? Math.min(100, Math.round((totalePesi / (selected.size * 4)) * 100)) : 0;

            // Identità
            const identita = analizzaIdentita();
            const dominante = getIdentitaDominante(identita);

            // Aggiorna UI
            document.getElementById('valoreNV').innerText = canali.NV.toFixed(1);
            document.getElementById('valorePV').innerText = canali.PV.toFixed(1);
            document.getElementById('valoreV').innerText = canali.V.toFixed(1);
            
            document.getElementById('bar-nv').style.width = Math.min(100, (canali.NV / 4) * 100) + '%';
            document.getElementById('bar-pv').style.width = Math.min(100, (canali.PV / 4) * 100) + '%';
            document.getElementById('bar-v').style.width = Math.min(100, (canali.V / 4) * 100) + '%';
            
            document.getElementById('intensity-level').innerText = intensita + '%';
            document.getElementById('pattern-count').innerText = risultati.length;

            // Pattern principale
            const mainDiv = document.getElementById('res');
            const secDiv = document.getElementById('secondary-patterns');
            const advDiv = document.getElementById('adv');
            
            if (risultati.length > 0) {
                mainDiv.innerHTML = `
                    <strong style="font-size:1.2rem;">${risultati[0].nome}</strong> 
                    <span class="direzione-badge ${risultati[0].direzione}">${risultati[0].prob}%</span>
                    <div style="margin-top:8px;">Direzione: <strong>${direzione.toUpperCase()}</strong></div>
                `;
                
                let secHtml = '';
                for (let i = 1; i < Math.min(4, risultati.length); i++) {
                    secHtml += `<div style="margin:5px 0;">• ${risultati[i].nome} (${risultati[i].prob}%)</div>`;
                }
                secDiv.innerHTML = secHtml || '<div style="color:#666;">Nessuno</div>';
                
                const suggerimenti = {
                    apertura: "La persona è recettiva. Incoraggia lo scambio.",
                    fuga: "Possibile disagio. Rallenta e rassicura.",
                    controllo: "Tentativo di dominare. Mantieni la calma.",
                    approccio: "Interesse crescente. Approfondisci."
                };
                advDiv.innerHTML = `💡 ${suggerimenti[direzione] || "Continua osservazione"}`;
                
                // Log
                let entry = `${new Date().toLocaleTimeString()} - ${risultati[0].nome}`;
                if (sessionLog[0] !== entry) {
                    sessionLog.unshift(entry);
                    if (sessionLog.length > 5) sessionLog.pop();
                    document.getElementById('log').innerHTML = sessionLog.join('<br>');
                }
            } else {
                mainDiv.innerHTML = "🌀 Nessun pattern rilevato";
                secDiv.innerHTML = '';
                advDiv.innerHTML = '';
            }

            // Render identità
            renderIdentita(identita, dominante);
        }

        // ==================== RESET ====================
        function reset() {
            if (confirm('Resettare tutti i segnali?')) {
                selected.clear();
                primoSegnale = null;
                sessionLog = [];
                document.getElementById('primoSegnaleLabel').textContent = 'Nessuno';
                render();
                document.getElementById('active-count').innerText = '0';
                document.getElementById('valoreNV').innerText = '0';
                document.getElementById('valorePV').innerText = '0';
                document.getElementById('valoreV').innerText = '0';
                document.getElementById('bar-nv').style.width = '0%';
                document.getElementById('bar-pv').style.width = '0%';
                document.getElementById('bar-v').style.width = '0%';
                document.getElementById('intensity-level').innerText = '0%';
                document.getElementById('pattern-count').innerText = '0';
                document.getElementById('res').innerHTML = '';
                document.getElementById('secondary-patterns').innerHTML = '';
                document.getElementById('adv').innerHTML = '';
                document.getElementById('log').innerHTML = '';
                document.getElementById('identita-dominante').innerText = '-';
                document.getElementById('identita-grid').innerHTML = '';
            }
        }

        // ==================== EVENTI ====================
        document.getElementById('analizzaBtn').onclick = analizza;
        document.getElementById('resetBtn').onclick = reset;
        document.getElementById('resetPrimo').onclick = () => {
            primoSegnale = null;
            document.getElementById('primoSegnaleLabel').textContent = 'Nessuno';
        };

        // ==================== AVVIO ====================
        render();
    </script>
</body>
</html>
