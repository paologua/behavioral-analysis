<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral Analysis 50/50</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            color: #00ff9d;
            text-align: center;
            margin-bottom: 10px;
        }
        .timer {
            text-align: center;
            font-size: 2rem;
            font-family: monospace;
            color: #00ff9d;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
            background: #0f0f0f;
            border-radius: 8px;
            margin: 10px 0;
        }
        .btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 8px;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
            text-align: left;
        }
        .btn.active {
            background: #007bff;
            color: white;
        }
        .btn.NV.active { background: #007bff; }
        .btn.PV.active { background: #28a745; }
        .btn.V.active { background: #ffc107; color: black; }
        
        .panel {
            background: #161616;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .canali-container {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 8px;
        }
        .canale-box {
            flex: 1;
            text-align: center;
        }
        .canale-valore {
            font-size: 2rem;
            font-weight: bold;
        }
        .NV { color: #007bff; }
        .PV { color: #28a745; }
        .V { color: #ffc107; }
        
        .bar-container {
            background: #333;
            height: 10px;
            border-radius: 5px;
            margin: 5px 0;
        }
        .bar { height: 100%; transition: width 0.3s; }
        
        select, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }
        #analizzaBtn { background: #28a745; font-weight: bold; }
        #resetBtn { background: #dc3545; }
        
        .identita-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .identita-item {
            background: #1e1e1e;
            padding: 8px;
            border-radius: 6px;
        }
        .identita-bar {
            height: 4px;
            background: #333;
            margin-top: 5px;
        }
        .identita-fill { height: 100%; }
    </style>
</head>
<body>
    <h2>🧠 BEHAVIORAL ANALYSIS 50/50</h2>
    <div class="timer" id="timer">00:00</div>

    <select id="ctx">
        <option value="FORMALE">👔 FORMALE</option>
        <option value="NEGOZIALE" selected>🤝 NEGOZIALE</option>
        <option value="CONFLITTUALE">🔥 CONFLITTUALE</option>
        <option value="INFORMALE">☕ INFORMALE</option>
    </select>

    <div class="primo-segnale" style="background:#1a1a1a; padding:10px; border-radius:8px; margin:10px 0; display:flex; justify-content:space-between;">
        <span>📌 Primo segnale: <span id="primoSegnaleLabel">Nessuno</span></span>
        <button id="resetPrimo" style="width:auto; background:#333; padding:5px 10px;">✕</button>
    </div>

    <div id="btn-container" class="grid"></div>

    <div class="panel">
        <div id="alert-box" style="color:#ff4d4d; display:none;">⚠️ INCONGRUENZA</div>
        
        <div class="canali-container">
            <div class="canale-box"><span class="canale-valore NV" id="valoreNV">0</span><div>NV</div></div>
            <div class="canale-box"><span class="canale-valore PV" id="valorePV">0</span><div>PV</div></div>
            <div class="canale-box"><span class="canale-valore V" id="valoreV">0</span><div>V</div></div>
        </div>
        
        <div class="bar-container"><div class="bar" id="bar-nv" style="background:#007bff"></div></div>
        <div class="bar-container"><div class="bar" id="bar-pv" style="background:#28a745"></div></div>
        <div class="bar-container"><div class="bar" id="bar-v" style="background:#ffc107"></div></div>
        
        <div style="display:flex; gap:10px; margin:10px 0;">
            <div>Attivi: <span id="active-count">0</span>/50</div>
            <div>Intensità: <span id="intensity-level">0%</span></div>
            <div>Pattern: <span id="pattern-count">0</span></div>
        </div>

        <div id="res" style="padding:10px; background:#1e1e1e; border-radius:6px; margin:10px 0;"></div>
        
        <div style="background:#1a2634; padding:10px; border-radius:6px;">
            <div style="display:flex; justify-content:space-between;">
                <span>🧠 IDENTITÀ</span>
                <span id="identita-dominante" style="background:#8e44ad; padding:3px 10px; border-radius:20px;"></span>
            </div>
            <div class="identita-grid" id="identita-grid"></div>
        </div>
        
        <div id="adv" style="color:#ffc107; margin-top:10px;"></div>
        <div id="secondary-patterns" style="margin-top:10px; color:#888;"></div>
    </div>

    <div id="log-container" style="background:#0d0d0d; padding:10px; margin-top:10px; font-size:0.8rem;"></div>

    <button id="resetBtn">🔄 RESET</button>
    <button id="analizzaBtn">🔍 ANALIZZA</button>

    <script>
        // ==================== DATI INLINE (niente file esterni) ====================
        const SEGNALI = [
            { id: "S001", nome: "Apnea/Respirazione superficiale", peso: 1.0, zona: "NV" },
            { id: "S002", nome: "Respirazione profonda/Rilassata", peso: 1.0, zona: "NV" },
            { id: "S003", nome: "Aumento ammiccamento (Blinking)", peso: 0.8, zona: "NV" },
            { id: "S004", nome: "Micro-tensioni facciali", peso: 0.9, zona: "NV" },
            { id: "S005", nome: "Sudorazione/Rossore", peso: 0.9, zona: "NV" },
            { id: "S006", nome: "Piedi verso interlocutore", peso: 0.7, zona: "NV" },
            { id: "S007", nome: "Piedi verso uscita", peso: 0.8, zona: "NV" },
            { id: "S008", nome: "Solidità plantare", peso: 0.6, zona: "NV" },

            { id: "S024", nome: "Palmi visibili", peso: 0.6, zona: "NV" },
            { id: "S025", nome: "Gesti illustratori", peso: 0.5, zona: "NV" },
            { id: "S026", nome: "Latenza risposta", peso: 0.5, zona: "PV" },
            { id: "S027", nome: "Tono alterato", peso: 0.4, zona: "PV" },

            { id: "S033", nome: "Velocità crescente (ansia/eccitazione)", peso: 0.6, zona: "PV" },

            { id: "S035", nome: "Ritmo irregolare (disagio)", peso: 0.6, zona: "PV" },
            { id: "S036", nome: "Ritmo sincopato (aggressività)", peso: 0.5, zona: "PV" },
            { id: "S037", nome: "Prolungamento vocali (esitazione)", peso: 0.4, zona: "PV" },
            { id: "S038", nome: "Frase interrotta a metà", peso: 0.6, zona: "PV" },
            { id: "S039", nome: "Linguaggio distanziante", peso: 0.3, zona: "V" },
            { id: "S040", nome: "Ambiguità verbale", peso: 0.3, zona: "V" },
            { id: "S041", nome: "Risposte brevi/monosillabiche", peso: 0.5, zona: "V" },
            { id: "S042", nome: "Risposte eccessivamente lunghe", peso: 0.4, zona: "V" },
            { id: "S043", nome: "Cambio improvviso di argomento", peso: 0.6, zona: "V" },
            { id: "S044", nome: "Generalizzazioni (sempre/mai)", peso: 0.5, zona: "V" },
            { id: "S045", nome: "Parole emotive positive", peso: 0.5, zona: "V" },
            { id: "S046", nome: "Parole emotive negative", peso: 0.5, zona: "V" },
            { id: "S047", nome: "Linguaggio metaforico", peso: 0.4, zona: "V" },
            { id: "S048", nome: "Ripetizioni/insistenze", peso: 0.5, zona: "V" },
            { id: "S049", nome: "Uso del 'noi' inclusivo", peso: 0.6, zona: "V" },
            { id: "S050", nome: "Distanziamento (si/loro vs io)", peso: 0.6, zona: "V" }
        ];

        const PATTERN_LIBRARY = [
            { nome: "Stress Acuto", cluster: "A", segnali: ["S001","S004","S021","S033"], direzione: "fuga" },
            { nome: "Negazione", cluster: "A", segnali: ["S012","S017","S026","S040"], direzione: "fuga" },
            { nome: "Ansia Sociale", cluster: "A", segnali: ["S003","S009","S021","S037","S041"], direzione: "fuga" },
            { nome: "Over-control", cluster: "A", segnali: ["S001","S013","S016","S031","S034"], direzione: "controllo" },
            { nome: "Rabbia Repressa", cluster: "A", segnali: ["S013","S029","S036","S046","S048"], direzione: "controllo" },
            { nome: "Fragilità Emotiva", cluster: "A", segnali: ["S003","S005","S021","S037"], direzione: "fuga" },
            { nome: "Resilienza", cluster: "A", segnali: ["S002","S008","S024","S032","S045"], direzione: "apertura" },
            { nome: "Panico", cluster: "A", segnali: ["S001","S003","S005","S033","S038"], direzione: "fuga" },
            { nome: "Vergogna", cluster: "A", segnali: ["S009","S012","S022","S030","S041"], direzione: "fuga" },
            { nome: "Disgusto", cluster: "A", segnali: ["S014","S015","S017","S046"], direzione: "fuga" },
            { nome: "Interesse Autentico", cluster: "B", segnali: ["S002","S006","S020","S024","S045"], direzione: "apertura" },
            { nome: "Dipendenza Emotiva", cluster: "B", segnali: ["S011","S012","S023","S029","S049"], direzione: "dipendenza" },
            { nome: "Seduzione", cluster: "B", segnali: ["S011","S020","S024","S032","S047"], direzione: "approccio" },
            { nome: "Micro-ritiro", cluster: "B", segnali: ["S007","S009","S017","S034","S039"], direzione: "fuga" },
            { nome: "Distanziamento Emotivo", cluster: "B", segnali: ["S009","S031","S041","S050","S039"], direzione: "fuga" },
            { nome: "Attaccamento Ansioso", cluster: "B", segnali: ["S003","S011","S021","S026","S049"], direzione: "dipendenza" },
            { nome: "Attaccamento Evitante", cluster: "B", segnali: ["S007","S009","S022","S034","S050"], direzione: "fuga" },
            { nome: "Attaccamento Sicuro", cluster: "B", segnali: ["S002","S006","S008","S024","S045"], direzione: "apertura" },
            { nome: "Empatia", cluster: "B", segnali: ["S011","S020","S024","S032","S049"], direzione: "apertura" },
            { nome: "Freddezza", cluster: "B", segnali: ["S009","S016","S031","S039","S050"], direzione: "fuga" },
            { nome: "Dominanza Naturale", cluster: "C", segnali: ["S002","S008","S019","S024","S032"], direzione: "controllo" },
            { nome: "Dominanza Aggressiva", cluster: "C", segnali: ["S004","S013","S015","S028","S036"], direzione: "controllo" },
            { nome: "Leadership Naturale", cluster: "C", segnali: ["S002","S008","S019","S024","S045"], direzione: "controllo" },
            { nome: "Sottomissione", cluster: "C", segnali: ["S009","S016","S022","S030","S041"], direzione: "sottomissione" },
            { nome: "Intimidazione", cluster: "C", segnali: ["S004","S015","S019","S029","S036"], direzione: "controllo" },
            { nome: "Autoritarismo", cluster: "C", segnali: ["S013","S015","S028","S029","S043"], direzione: "controllo" },
            { nome: "Carisma", cluster: "C", segnali: ["S002","S008","S019","S024","S032"], direzione: "approccio" },
            { nome: "Sfida", cluster: "C", segnali: ["S004","S010","S013","S028","S036"], direzione: "controllo" },
            { nome: "Deferenza", cluster: "C", segnali: ["S009","S011","S022","S030","S034"], direzione: "sottomissione" },
            { nome: "Competizione", cluster: "C", segnali: ["S004","S010","S019","S028","S043"], direzione: "controllo" },
            { nome: "Inganno Strutturato", cluster: "D", segnali: ["S001","S011","S029","S040","S043"], direzione: "controllo" },
            { nome: "Autosabotaggio", cluster: "D", segnali: ["S004","S014","S021","S027","S048"], direzione: "fuga" },
            { nome: "Manipolazione Soft", cluster: "D", segnali: ["S011","S024","S029","S047","S049"], direzione: "controllo" },
            { nome: "Confusione Strategica", cluster: "D", segnali: ["S035","S038","S040","S043","S047"], direzione: "controllo" },
            { nome: "Gaslighting", cluster: "D", segnali: ["S014","S040","S043","S046","S048"], direzione: "controllo" },
            { nome: "Narcisismo", cluster: "D", segnali: ["S011","S019","S024","S029","S046"], direzione: "controllo" },
            { nome: "Vittimismo", cluster: "D", segnali: ["S005","S009","S021","S041","S046"], direzione: "vittima" },
            { nome: "Doppiezza", cluster: "D", segnali: ["S011","S016","S029","S040","S047"], direzione: "controllo" },
            { nome: "Sfruttamento", cluster: "D", segnali: ["S004","S010","S019","S028","S043"], direzione: "controllo" },
            { nome: "Dissimulazione", cluster: "D", segnali: ["S001","S016","S031","S039","S040"], direzione: "controllo" },
            { nome: "Cooperazione", cluster: "E", segnali: ["S006","S008","S020","S024","S049"], direzione: "apertura" },
            { nome: "Resistenza Passiva", cluster: "E", segnali: ["S009","S016","S017","S021","S041"], direzione: "fuga" },
            { nome: "Resistenza Attiva", cluster: "E", segnali: ["S004","S015","S019","S028","S043"], direzione: "controllo" },
            { nome: "Coping Attivo", cluster: "E", segnali: ["S002","S008","S013","S020","S045"], direzione: "approccio" },
            { nome: "Mediazione", cluster: "E", segnali: ["S002","S006","S008","S020","S049"], direzione: "apertura" },
            { nome: "Aggressività Passiva", cluster: "E", segnali: ["S009","S016","S021","S027","S048"], direzione: "indiretto" },
            { nome: "Conflitto Aperto", cluster: "E", segnali: ["S004","S013","S028","S036","S043"], direzione: "conflitto" },
            { nome: "Pacifismo", cluster: "E", segnali: ["S002","S006","S008","S024","S045"], direzione: "apertura" },
            { nome: "Ostilità", cluster: "E", segnali: ["S004","S013","S015","S028","S046"], direzione: "conflitto" },
            { nome: "Resistenza Verbale", cluster: "E", segnali: ["S028","S041","S042","S043","S048"], direzione: "fuga" }
        ];

        const CONTESTI = {
            FORMALE: { moltiplicatore: 1.2, focus: ["C", "D"] },
            INFORMALE: { moltiplicatore: 0.8, focus: ["B", "E"] },
            NEGOZIALE: { moltiplicatore: 1.5, focus: ["A", "D", "E"] },
            CONFLITTUALE: { moltiplicatore: 1.3, focus: ["A", "C", "E"] }
        };

        // ==================== STATO ====================
        let selected = new Set();
        let sessionLog = [];
        let primoSegnale = null;
        let secondi = 0;
        let timerInterval;

        // ==================== TIMER ====================
        timerInterval = setInterval(() => {
            secondi++;
            const min = Math.floor(secondi / 60).toString().padStart(2, '0');
            const sec = (secondi % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${min}:${sec}`;
        }, 1000);

        // ==================== RENDER ====================
        function render() {
            const container = document.getElementById('btn-container');
            container.innerHTML = '';
            
            SEGNALI.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `btn ${s.zona} ${selected.has(s.id) ? 'active' : ''}`;
                btn.innerText = `${s.id}: ${s.nome.substring(0, 20)}`;
                btn.onclick = () => toggleSegnale(s.id);
                container.appendChild(btn);
            });
        }

        function toggleSegnale(id) {
            if (selected.has(id)) {
                selected.delete(id);
            } else {
                selected.add(id);
                if (!primoSegnale) {
                    const s = SEGNALI.find(s => s.id === id);
                    primoSegnale = s.nome;
                    document.getElementById('primoSegnaleLabel').textContent = s.nome;
                }
            }
            render();
            document.getElementById('active-count').innerText = selected.size;
        }

        // ==================== ANALISI ====================
        function analizza() {
            if (selected.size === 0) return alert('Seleziona almeno un segnale');
            
            let canali = { NV: 0, PV: 0, V: 0 };
            let conteggi = { NV: 0, PV: 0, V: 0 };
            
            selected.forEach(id => {
                const s = SEGNALI.find(s => s.id === id);
                if (!s) return;
                if (s.zona === "NV") { canali.NV += s.peso; conteggi.NV++; }
                if (s.zona === "PV") { canali.PV += s.peso; conteggi.PV++; }
                if (s.zona === "V") { canali.V += s.peso; conteggi.V++; }
            });

            let risultati = [];
            PATTERN_LIBRARY.forEach(p => {
                let score = 0, max = 0;
                p.segnali.forEach(id => {
                    const s = SEGNALI.find(s => s.id === id);
                    if (!s) return;
                    max += s.peso;
                    if (selected.has(id)) score += s.peso;
                });
                if (max > 0) {
                    let prob = (score / max) * 100;
                    if (prob > 15) risultati.push({ nome: p.nome, prob: Math.round(prob), direzione: p.direzione });
                }
            });
            risultati.sort((a, b) => b.prob - a.prob);

            // Aggiorna UI
            document.getElementById('valoreNV').innerText = canali.NV.toFixed(1);
            document.getElementById('valorePV').innerText = canali.PV.toFixed(1);
            document.getElementById('valoreV').innerText = canali.V.toFixed(1);
            
            document.getElementById('bar-nv').style.width = Math.min(100, canali.NV * 8) + '%';
            document.getElementById('bar-pv').style.width = Math.min(100, canali.PV * 8) + '%';
            document.getElementById('bar-v').style.width = Math.min(100, canali.V * 8) + '%';
            
            document.getElementById('pattern-count').innerText = risultati.length;
            
            if (risultati.length > 0) {
                document.getElementById('res').innerHTML = `<strong>${risultati[0].nome}</strong> (${risultati[0].prob}%)`;
                
                let sec = '';
                for (let i = 1; i < Math.min(4, risultati.length); i++) {
                    sec += `<div>${risultati[i].nome} (${risultati[i].prob}%)</div>`;
                }
                document.getElementById('secondary-patterns').innerHTML = sec;
                
                let entry = `${new Date().toLocaleTimeString()} - ${risultati[0].nome}`;
                if (sessionLog[0] !== entry) {
                    sessionLog.unshift(entry);
                    if (sessionLog.length > 5) sessionLog.pop();
                    document.getElementById('log-container').innerHTML = '<strong>📋 Log:</strong><br>' + sessionLog.join('<br>');
                }
            }
        }

        // ==================== RESET ====================
        function reset() {
            if (confirm('Resettare?')) {
                selected.clear();
                primoSegnale = null;
                document.getElementById('primoSegnaleLabel').textContent = 'Nessuno';
                render();
                document.getElementById('active-count').innerText = '0';
                document.getElementById('valoreNV').innerText = '0';
                document.getElementById('valorePV').innerText = '0';
                document.getElementById('valoreV').innerText = '0';
                document.getElementById('bar-nv').style.width = '0%';
                document.getElementById('bar-pv').style.width = '0%';
                document.getElementById('bar-v').style.width = '0%';
                document.getElementById('res').innerHTML = '';
                document.getElementById('secondary-patterns').innerHTML = '';
            }
        }

        // ==================== EVENTI ====================
        document.getElementById('resetBtn').onclick = reset;
        document.getElementById('analizzaBtn').onclick = analizza;
        document.getElementById('resetPrimo').onclick = () => {
            primoSegnale = null;
            document.getElementById('primoSegnaleLabel').textContent = 'Nessuno';
        };

        // ==================== AVVIO ====================
        render();
    </script>
</body>
</html>
