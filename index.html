<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Behavioral Analysis System - Completo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a2634;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
            color: #e0e0e0;
        }
        .container {
            background: #2c3e50;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #405b73;
        }
        h1 {
            color: #ecf0f1;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .timer {
            text-align: center;
            font-size: 2.5rem;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            margin-bottom: 20px;
            background: #1e2b3a;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #405b73;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            font-weight: bold;
            letter-spacing: 5px;
        }
        .primo-segnale {
            background: #1e2b3a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00ff9d;
        }
        .primo-segnale span:first-child {
            color: #b0c4de;
        }
        #primoSegnaleLabel {
            font-weight: bold;
            color: #00ff9d;
            font-size: 1.1rem;
        }
        select, .note-btn, .export-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #405b73;
            border-radius: 10px;
            font-size: 1rem;
            background: #1e2b3a;
            color: #ecf0f1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        select:hover, .note-btn:hover, .export-btn:hover {
            background: #2c3e50;
            border-color: #00ff9d;
        }
        .note-btn { background: #2980b9; border-color: #3498db; }
        .export-btn { background: #27ae60; border-color: #2ecc71; }
        
        .filtri {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filtro {
            flex: 1;
            min-width: 60px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #1e2b3a;
            color: #b0c4de;
            cursor: pointer;
            font-weight: 600;
            border: 1px solid #405b73;
            transition: all 0.3s;
        }
        .filtro.active {
            background: #00ff9d;
            color: #1a2634;
            border-color: #00ff9d;
            box-shadow: 0 0 15px rgba(0,255,157,0.3);
        }
        
        #segnaliList {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            border-radius: 12px;
            padding: 5px;
            scrollbar-width: thin;
            scrollbar-color: #00ff9d #1e2b3a;
        }
        #segnaliList::-webkit-scrollbar {
            width: 6px;
        }
        #segnaliList::-webkit-scrollbar-track {
            background: #1e2b3a;
            border-radius: 10px;
        }
        #segnaliList::-webkit-scrollbar-thumb {
            background: #00ff9d;
            border-radius: 10px;
        }
        
        .segnale {
            background: #1e2b3a;
            border: 1px solid #405b73;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }
        .segnale:hover {
            border-color: #00ff9d;
            transform: translateX(5px);
        }
        .segnale-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .segnale-nome {
            font-weight: 600;
            color: #ecf0f1;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-NV { background: #3498db; color: white; }
        .badge-PV { background: #e67e22; color: white; }
        .badge-V { background: #27ae60; color: white; }
        
        .pesi {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }
        .peso-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #405b73;
            background: #2c3e50;
            color: #b0c4de;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }
        .peso-btn:hover {
            background: #405b73;
        }
        .peso-btn.active {
            background: #00ff9d;
            color: #1a2634;
            border-color: #00ff9d;
            box-shadow: 0 0 10px rgba(0,255,157,0.5);
        }
        
        .valore-corrente {
            font-size: 0.8rem;
            color: #b0c4de;
            text-align: right;
            margin-top: 5px;
        }
        
        .analyze-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            margin: 20px 0;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(231,76,60,0.4);
            transition: all 0.3s;
        }
        .analyze-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(231,76,60,0.6);
        }
        
        .risultati {
            background: #1e2b3a;
            padding: 20px;
            border-radius: 15px;
            display: none;
            border: 2px solid #405b73;
            margin-top: 20px;
        }
        .risultati h3 {
            color: #00ff9d;
            margin-bottom: 20px;
            font-size: 1.3rem;
            text-align: center;
        }
        
        .confronto {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #2c3e50;
            border-radius: 12px;
            border: 1px solid #405b73;
        }
        .canale {
            text-align: center;
        }
        .valore {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
        }
        .NV { color: #3498db; text-shadow: 0 0 10px rgba(52,152,219,0.3); }
        .PV { color: #e67e22; text-shadow: 0 0 10px rgba(230,126,34,0.3); }
        .V { color: #27ae60; text-shadow: 0 0 10px rgba(39,174,96,0.3); }
        
        .result-card {
            background: #2c3e50;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #00ff9d;
        }
        .pattern-card {
            background: linear-gradient(135deg, #2980b9, #3498db);
            border-left: 4px solid #f1c40f;
            text-align: center;
        }
        .pattern-badge {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: white;
        }
        .pattern-score {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .pattern-cluster {
            font-size: 0.9rem;
            opacity: 0.9;
            color: white;
        }
        
        .intensity-bar {
            height: 20px;
            background: #1e2b3a;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid #405b73;
        }
        .intensity-fill {
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #e67e22, #e74c3c);
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 10px rgba(231,76,60,0.5);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #2c3e50;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 30px rgba(0,255,157,0.2);
        }
        .modal-content h3 {
            color: #00ff9d;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #405b73;
            border-radius: 8px;
            margin: 10px 0;
            font-family: inherit;
            background: #1e2b3a;
            color: #ecf0f1;
            font-size: 1rem;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        button { cursor: pointer; }
        .btn-primary {
            background: #00ff9d;
            color: #1a2634;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
        }
        .btn-secondary {
            background: #405b73;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
        }
        .stat-box {
            background: #2c3e50;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #b0c4de;
            border: 1px dashed #405b73;
        }
        .badge-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .info-badge {
            background: #00ff9d;
            color: #1a2634;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .json-export {
            background: #1e2b3a;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #405b73;
            color: #b0c4de;
        }
        .controlli-export {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 BEHAVIORAL ANALYSIS</h1>
        
        <!-- Timer -->
        <div class="timer" id="timer">00:00</div>
        
        <!-- Barra primo segnale -->
        <div class="primo-segnale">
            <span>📌 PRIMO SEGNALE:</span>
            <span id="primoSegnaleLabel">Nessuno</span>
            <button id="resetPrimo" class="btn-secondary" style="padding:5px 10px;">✕</button>
        </div>
        
        <!-- Controlli principali -->
        <div style="display: flex; gap: 10px;">
            <select id="contesto" style="flex: 2;">
                <option value="formale">🏢 Formale</option>
                <option value="informale">☕ Informale</option>
                <option value="negoziale" selected>🤝 Negoziale</option>
                <option value="conflittuale">⚔️ Conflittuale</option>
                <option value="intimo">❤️ Intimo</option>
            </select>
            <button class="note-btn" id="noteBtn" style="flex: 1;">📝 Note</button>
            <button class="export-btn" id="exportBtn" style="flex: 1;">📤 Export</button>
        </div>
        
        <!-- Filtri canale -->
        <div class="filtri">
            <button class="filtro active" data-filtro="all">Tutti</button>
            <button class="filtro" data-filtro="NV">NV</button>
            <button class="filtro" data-filtro="PV">PV</button>
            <button class="filtro" data-filtro="V">V</button>
        </div>
        
        <!-- Lista segnali -->
        <div id="segnaliList"></div>
        
        <!-- Pulsante Analizza -->
        <button class="analyze-btn" id="analizzaBtn">🔍 ANALIZZA COMPORTAMENTO</button>
        
        <!-- Pannello Risultati -->
        <div class="risultati" id="risultati">
            <h3>📊 RISULTATI ANALISI</h3>
            
            <!-- Confronto NV-PV-V -->
            <div class="confronto">
                <div class="canale">
                    <div class="valore NV" id="valoreNV">0</div>
                    <div style="font-size:0.8rem;">NV</div>
                </div>
                <div class="canale">
                    <div class="valore PV" id="valorePV">0</div>
                    <div style="font-size:0.8rem;">PV</div>
                </div>
                <div class="canale">
                    <div class="valore V" id="valoreV">0</div>
                    <div style="font-size:0.8rem;">V</div>
                </div>
            </div>
            
            <!-- Pattern principale -->
            <div class="result-card pattern-card">
                <div class="pattern-badge" id="patternNome">-</div>
                <div class="pattern-score" id="patternScore">0%</div>
                <div class="pattern-cluster" id="patternCluster"></div>
            </div>
            
            <!-- Pattern secondario -->
            <div class="result-card" id="secondarioCard" style="display:none;">
                <strong>📌 Pattern secondario:</strong><br>
                <span id="secondarioNome"></span> (<span id="secondarioScore"></span>%)
            </div>
            
            <!-- Intensità -->
            <div class="result-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <strong>⚡ Intensità</strong>
                    <span id="intensitaValore">0%</span>
                </div>
                <div class="intensity-bar">
                    <div class="intensity-fill" id="intensityBar" style="width:0%"></div>
                </div>
                <div style="font-size:0.8rem; color:#b0c4de;" id="intensitaDetail"></div>
            </div>
            
            <!-- Direzione e Congruenza -->
            <div style="display: flex; gap: 10px;">
                <div class="result-card" style="flex:1;">
                    <strong>🧭 Direzione</strong><br>
                    <span id="direzioneText" style="font-size:1.2rem;">-</span>
                </div>
                <div class="result-card" style="flex:2;">
                    <strong>🔄 Congruenza</strong><br>
                    <span id="congruenzaTipo" style="font-weight:bold;"></span><br>
                    <span style="font-size:0.8rem;" id="congruenzaDesc"></span>
                </div>
            </div>
            
            <!-- Statistiche e JSON -->
            <div class="stat-box" id="statBox"></div>
            <div id="jsonContainer" style="display:none;">
                <div class="json-export" id="jsonOutput"></div>
                <div class="controlli-export">
                    <button class="btn-primary" id="copiaJson">📋 Copia</button>
                    <button class="btn-primary" id="scaricaJson">💾 Scarica</button>
                    <button class="btn-secondary" id="chiudiJson">✕ Chiudi</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Note -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <h3>📝 NUOVA NOTA</h3>
            <textarea id="noteText" rows="4" placeholder="Osservazioni sul comportamento..."></textarea>
            <div class="modal-actions">
                <button class="btn-secondary" id="annullaNota">Annulla</button>
                <button class="btn-primary" id="salvaNota">Salva</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATI COMPLETI ====================
        const SEGNALI = [
            { id: "S001", nome: "Respiro corto/toracico", canale: "NV" },
            { id: "S002", nome: "Respiro profondo/addominale", canale: "NV" },
            { id: "S003", nome: "Trattenere il respiro", canale: "NV" },
            { id: "S004", nome: "Micro-tensioni mandibola", canale: "NV" },
            { id: "S005", nome: "Micro-tensioni fronte", canale: "NV" },
            { id: "S006", nome: "Piedi agitati/ballano", canale: "NV" },
            { id: "S007", nome: "Piedi orientati verso uscita", canale: "NV" },
            { id: "S008", nome: "Orientamento frontale", canale: "NV" },
            { id: "S009", nome: "Orientamento laterale", canale: "NV" },
            { id: "S010", nome: "Sguardo diretto/fisso", canale: "NV" },
            { id: "S011", nome: "Sguardo evitante/mobile", canale: "NV" },
            { id: "S012", nome: "Postura chiusa", canale: "NV" },
            { id: "S013", nome: "Postura aperta", canale: "NV" },
            { id: "S014", nome: "Automanipolazioni", canale: "NV" },
            { id: "S015", nome: "Mani tese/contratte", canale: "NV" },
            { id: "S016", nome: "Espressività ridotta", canale: "NV" },
            { id: "S017", nome: "Espressività aumentata", canale: "NV" },
            { id: "S018", nome: "Pause piene (ehm, mmh)", canale: "PV" },
            { id: "S019", nome: "Pause vuote (silenzio)", canale: "PV" },
            { id: "S020", nome: "Ritmo accelerato", canale: "PV" },
            { id: "S021", nome: "Ritmo rallentato", canale: "PV" },
            { id: "S022", nome: "Volume aumentato", canale: "PV" },
            { id: "S023", nome: "Volume diminuito", canale: "PV" },
            { id: "S024", nome: "Deglutizioni frequenti", canale: "PV" },
            { id: "S025", nome: "Coerenza narrativa alta", canale: "V" },
            { id: "S026", nome: "Coerenza narrativa bassa", canale: "V" },
            { id: "S027", nome: "Ambiguità lessicale", canale: "V" },
            { id: "S028", nome: "Lessico ricco/preciso", canale: "V" },
            { id: "S029", nome: "Tono congruente", canale: "V" },
            { id: "S030", nome: "Tono incongruente", canale: "V" }
        ];

        const PATTERN_LIBRARY = [
            { nome: "Stress Cognitivo", cluster: "A", segnali: ["S001","S004","S018","S026"], direzione: "fuga" },
            { nome: "Ansia Sociale", cluster: "A", segnali: ["S007","S011","S012","S023"], direzione: "fuga" },
            { nome: "Conflitto Interno", cluster: "A", segnali: ["S003","S016","S019","S030"], direzione: "controllo" },
            { nome: "Over-control", cluster: "A", segnali: ["S003","S016","S021","S023"], direzione: "controllo" },
            { nome: "Interesse Autentico", cluster: "B", segnali: ["S008","S010","S013","S029"], direzione: "apertura" },
            { nome: "Seduzione", cluster: "B", segnali: ["S008","S010","S017","S020"], direzione: "approccio" },
            { nome: "Micro-ritiro", cluster: "B", segnali: ["S007","S009","S011","S019"], direzione: "fuga" },
            { nome: "Dominanza Naturale", cluster: "C", segnali: ["S002","S008","S010","S013"], direzione: "controllo" },
            { nome: "Dominanza Aggressiva", cluster: "C", segnali: ["S001","S004","S010","S022"], direzione: "controllo" },
            { nome: "Leadership Naturale", cluster: "C", segnali: ["S002","S008","S013","S025"], direzione: "controllo" },
            { nome: "Inganno", cluster: "D", segnali: ["S003","S011","S016","S030"], direzione: "controllo" },
            { nome: "Manipolazione Soft", cluster: "D", segnali: ["S008","S010","S017","S027"], direzione: "controllo" },
            { nome: "Manipolazione Hard", cluster: "D", segnali: ["S001","S004","S020","S022"], direzione: "controllo" },
            { nome: "Cooperazione", cluster: "E", segnali: ["S008","S010","S013","S025"], direzione: "apertura" },
            { nome: "Resistenza Passiva", cluster: "E", segnali: ["S009","S011","S012","S021"], direzione: "fuga" },
            { nome: "Resistenza Attiva", cluster: "E", segnali: ["S001","S004","S020","S022"], direzione: "controllo" },
            { nome: "Baseline Deviation", cluster: "F", segnali: ["S001","S004","S006","S011"], direzione: "varia" },
            { nome: "Micro-shift Emotivo", cluster: "F", segnali: ["S005","S016","S017","S024"], direzione: "varia" },
            { nome: "Micro-shift Relazionale", cluster: "F", segnali: ["S007","S008","S009","S011"], direzione: "varia" }
        ];

        // ==================== STATO ====================
        let stato = {};
        SEGNALI.forEach(s => { stato[s.id] = 0; });
        
        let primoSegnale = null;
        let note = JSON.parse(localStorage.getItem('notes')) || [];
        let secondi = 0;
        let filtroCorrente = 'all';
        let contestoCorrente = 'negoziale';
        let sessionStart = new Date().toISOString();

        // ==================== DOM ====================
        const segnaliList = document.getElementById('segnaliList');
        const timerEl = document.getElementById('timer');
        const primoSegnaleLabel = document.getElementById('primoSegnaleLabel');
        const resetPrimo = document.getElementById('resetPrimo');
        const contestoSelect = document.getElementById('contesto');
        const filtri = document.querySelectorAll('.filtro');
        const analizzaBtn = document.getElementById('analizzaBtn');
        const risultatiDiv = document.getElementById('risultati');
        const valoreNV = document.getElementById('valoreNV');
        const valorePV = document.getElementById('valorePV');
        const valoreV = document.getElementById('valoreV');
        const patternNome = document.getElementById('patternNome');
        const patternScore = document.getElementById('patternScore');
        const patternCluster = document.getElementById('patternCluster');
        const intensitaValore = document.getElementById('intensitaValore');
        const intensityBar = document.getElementById('intensityBar');
        const intensitaDetail = document.getElementById('intensitaDetail');
        const direzioneText = document.getElementById('direzioneText');
        const congruenzaTipo = document.getElementById('congruenzaTipo');
        const congruenzaDesc = document.getElementById('congruenzaDesc');
        const secondarioCard = document.getElementById('secondarioCard');
        const secondarioNome = document.getElementById('secondarioNome');
        const secondarioScore = document.getElementById('secondarioScore');
        const statBox = document.getElementById('statBox');
        const jsonContainer = document.getElementById('jsonContainer');
        const jsonOutput = document.getElementById('jsonOutput');
        
        // Bottoni
        const noteBtn = document.getElementById('noteBtn');
        const exportBtn = document.getElementById('exportBtn');
        const noteModal = document.getElementById('noteModal');
        const noteText = document.getElementById('noteText');
        const salvaNota = document.getElementById('salvaNota');
        const annullaNota = document.getElementById('annullaNota');
        const copiaJson = document.getElementById('copiaJson');
        const scaricaJson = document.getElementById('scaricaJson');
        const chiudiJson = document.getElementById('chiudiJson');

        // ==================== TIMER ====================
        setInterval(() => {
            secondi++;
            const min = Math.floor(secondi / 60).toString().padStart(2, '0');
            const sec = (secondi % 60).toString().padStart(2, '0');
            timerEl.textContent = `${min}:${sec}`;
        }, 1000);

        // ==================== RENDER ====================
        function renderSegnali() {
            let html = '';
            const filtrati = filtroCorrente === 'all' ? SEGNALI : SEGNALI.filter(s => s.canale === filtroCorrente);
            
            filtrati.forEach(s => {
                const valore = stato[s.id];
                html += `
                    <div class="segnale">
                        <div class="segnale-header">
                            <span class="segnale-nome">${s.nome}</span>
                            <span class="badge badge-${s.canale}">${s.canale}</span>
                        </div>
                        <div class="pesi">
                            <button class="peso-btn ${valore === 0 ? 'active' : ''}" onclick="setPeso('${s.id}', 0)">0</button>
                            <button class="peso-btn ${valore === 1 ? 'active' : ''}" onclick="setPeso('${s.id}', 1)">1</button>
                            <button class="peso-btn ${valore === 2 ? 'active' : ''}" onclick="setPeso('${s.id}', 2)">2</button>
                            <button class="peso-btn ${valore === 3 ? 'active' : ''}" onclick="setPeso('${s.id}', 3)">3</button>
                            <button class="peso-btn ${valore === 4 ? 'active' : ''}" onclick="setPeso('${s.id}', 4)">4</button>
                        </div>
                        <div class="valore-corrente">valore: ${valore}</div>
                    </div>
                `;
            });
            segnaliList.innerHTML = html;
        }

        window.setPeso = function(id, peso) {
            stato[id] = peso;
            if (peso > 0 && !primoSegnale) {
                const segnale = SEGNALI.find(s => s.id === id);
                primoSegnale = segnale.nome;
                primoSegnaleLabel.textContent = segnale.nome;
            }
            if (peso === 0 && primoSegnale) {
                const segnalePrimo = SEGNALI.find(s => s.nome === primoSegnale);
                if (segnalePrimo && segnalePrimo.id === id) {
                    const altri = Object.entries(stato).some(([key, val]) => val > 0 && key !== id);
                    if (!altri) {
                        primoSegnale = null;
                        primoSegnaleLabel.textContent = 'Nessuno';
                    }
                }
            }
            renderSegnali();
        };

        // ==================== ANALISI ====================
        function calcolaStatistiche() {
            let sommaNV = 0, sommaPV = 0, sommaV = 0;
            let countNV = 0, countPV = 0, countV = 0;
            SEGNALI.forEach(s => {
                const val = stato[s.id];
                if (s.canale === 'NV') { sommaNV += val; countNV++; }
                if (s.canale === 'PV') { sommaPV += val; countPV++; }
                if (s.canale === 'V') { sommaV += val; countV++; }
            });
            return {
                mediaNV: (sommaNV / countNV).toFixed(1),
                mediaPV: (sommaPV / countPV).toFixed(1),
                mediaV: (sommaV / countV).toFixed(1),
                sommaNV, sommaPV, sommaV, countNV, countPV, countV
            };
        }

        function calcolaPattern() {
            return PATTERN_LIBRARY.map(p => {
                let score = 0, max = p.segnali.length * 4;
                p.segnali.forEach(id => score += stato[id] || 0);
                return { ...p, score: Math.round((score / max) * 100) };
            }).filter(p => p.score > 0).sort((a, b) => b.score - a.score);
        }

        function determinaCongruenza(nv, pv, v) {
            const n = parseFloat(nv), p = parseFloat(pv), vv = parseFloat(v);
            if (n > p && p > vv) return { tipo: '✅ AUTENTICO', desc: 'NV > PV > V - Pattern autentico' };
            if (n === p && p === vv) return { tipo: '🟦 ALLINEATO', desc: 'Tutti i canali allineati' };
            if (n === p && n > vv) return { tipo: '⚠️ DISSONANZA', desc: 'NV e PV allineati, V più basso' };
            if (n === p && n < vv) return { tipo: '⚠️ DISSONANZA', desc: 'NV e PV allineati, V più alto' };
            if (p === vv && n > p) return { tipo: '🔄 CONTROLLO', desc: 'NV più alto di PV e V allineati' };
            if (p === vv && n < p) return { tipo: '🔄 INIBITO', desc: 'NV più basso di PV e V allineati' };
            return { tipo: '❓ MISTO', desc: 'Pattern non chiaramente definito' };
        }

        analizzaBtn.addEventListener('click', () => {
            const stats = calcolaStatistiche();
            const patterns = calcolaPattern();
            const principale = patterns[0] || { nome: 'Nessuno', score: 0, cluster: '-', direzione: '-' };
            const secondario = patterns[1] || null;
            const congruenza = determinaCongruenza(stats.mediaNV, stats.mediaPV, stats.mediaV);
            
            const valoriAttivi = Object.values(stato).filter(v => v > 0);
            const mediaTotale = valoriAttivi.length ? 
                (valoriAttivi.reduce((a, b) => a + b, 0) / valoriAttivi.length) : 0;
            const intensita = valoriAttivi.length ? Math.round((mediaTotale / 4) * 100) : 0;
            
            valoreNV.textContent = stats.mediaNV;
            valorePV.textContent = stats.mediaPV;
            valoreV.textContent = stats.mediaV;
            
            patternNome.textContent = principale.nome;
            patternScore.textContent = principale.score + '%';
            patternCluster.textContent = `Cluster ${principale.cluster}`;
            
            intensitaValore.textContent = intensita + '%';
            intensityBar.style.width = intensita + '%';
            intensitaDetail.textContent = `${valoriAttivi.length} segnali attivi, media ${mediaTotale.toFixed(1)}/4`;
            
            direzioneText.textContent = principale.direzione;
            congruenzaTipo.textContent = congruenza.tipo;
            congruenzaDesc.textContent = congruenza.desc;
            
            if (secondario) {
                secondarioCard.style.display = 'block';
                secondarioNome.textContent = secondario.nome;
                secondarioScore.textContent = secondario.score;
            } else secondarioCard.style.display = 'none';
            
            statBox.innerHTML = `
                📊 Segnali attivi: ${valoriAttivi.length}/${SEGNALI.length}<br>
                📌 Primo segnale: ${primoSegnale || 'nessuno'}<br>
                🎯 Contesto: ${contestoCorrente}<br>
                📈 Pattern trovati: ${patterns.length}
            `;
            
            risultatiDiv.style.display = 'block';
        });

        // ==================== EXPORT JSON ====================
        function generaJSON() {
            return {
                sessione: {
                    data: new Date().toLocaleString(),
                    durata: timerEl.textContent,
                    contesto: contestoCorrente,
                    primo_segnale: primoSegnale
                },
                stato_completo: stato,
                note: note,
                statistiche: calcolaStatistiche(),
                patterns: calcolaPattern().slice(0, 5)
            };
        }

        exportBtn.addEventListener('click', () => {
            const data = generaJSON();
            jsonOutput.textContent = JSON.stringify(data, null, 2);
            jsonContainer.style.display = 'block';
        });

        copiaJson.addEventListener('click', () => {
            navigator.clipboard.writeText(jsonOutput.textContent);
            alert('✅ JSON copiato negli appunti!');
        });

        scaricaJson.addEventListener('click', () => {
            const blob = new Blob([jsonOutput.textContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `analisi_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });

        chiudiJson.addEventListener('click', () => {
            jsonContainer.style.display = 'none';
        });

        // ==================== NOTE ====================
        noteBtn.addEventListener('click', () => noteModal.classList.add('show'));
        annullaNota.addEventListener('click', () => {
            noteModal.classList.remove('show');
            noteText.value = '';
        });
        
        salvaNota.addEventListener('click', () => {
            if (noteText.value.trim()) {
                note.push({
                    testo: noteText.value,
                    timestamp: new Date().toLocaleString(),
                    contesto: contestoCorrente,
                    primo_segnale: primoSegnale
                });
                localStorage.setItem('notes', JSON.stringify(note));
                noteModal.classList.remove('show');
                noteText.value = '';
                alert('✅ Nota salvata!');
            }
        });

        noteModal.addEventListener('click', (e) => {
            if (e.target === noteModal) {
                noteModal.classList.remove('show');
                noteText.value = '';
            }
        });

        // ==================== FILTRI ====================
        filtri.forEach(f => {
            f.addEventListener('click', function() {
                filtri.forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                filtroCorrente = this.dataset.filtro;
                renderSegnali();
            });
        });

        resetPrimo.addEventListener('click', () => {
            primoSegnale = null;
            primoSegnaleLabel.textContent = 'Nessuno';
        });

        contestoSelect.addEventListener('change', (e) => {
            contestoCorrente = e.target.value;
        });

        // ==================== AVVIO ====================
        renderSegnali();
    </script>
</body>
</html>
