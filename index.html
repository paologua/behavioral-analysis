<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Behavioral Analysis System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>Analisi Comportamentale</h1>
            <div class="header-controls">
                <button id="menuBtn" class="icon-btn">☰</button>
                <span id="sessionTimer">00:00</span>
            </div>
        </header>

        <!-- Menu a tendina -->
        <div id="slideMenu" class="slide-menu hidden">
            <div class="menu-header">
                <h3>Menu</h3>
                <button id="closeMenuBtn" class="icon-btn">✕</button>
            </div>
            <div class="menu-content">
                <button id="newSessionBtn" class="menu-item">Nuova Sessione</button>
                <button id="baselineBtn" class="menu-item">Costruisci Baseline</button>
                <button id="exportBtn" class="menu-item">Esporta JSON</button>
                <button id="settingsBtn" class="menu-item">Impostazioni</button>
                <hr>
                <div class="context-selector">
                    <label>Contesto:</label>
                    <select id="contextSelect">
                        <option value="formale">Formale</option>
                        <option value="informale">Informale</option>
                        <option value="negoziale" selected>Negoziale</option>
                        <option value="conflittuale">Conflittuale</option>
                        <option value="intimo">Intimo</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Pannello di controllo rapido -->
            <div class="quick-controls">
                <div class="control-group">
                    <button id="primoSegnaleBtn" class="control-btn primary">📌 Primo Segnale</button>
                    <span id="primoSegnaleLabel">Nessuno</span>
                </div>
                <div class="control-group">
                    <button id="noteBtn" class="control-btn">📝 Nota</button>
                </div>
            </div>

            <!-- Filtri per canale -->
            <div class="channel-filters">
                <button class="filter-btn active" data-filter="all">Tutti</button>
                <button class="filter-btn" data-filter="NV">NV</button>
                <button class="filter-btn" data-filter="PV">PV</button>
                <button class="filter-btn" data-filter="V">V</button>
            </div>

            <!-- Lista segnali -->
            <div id="segnaliContainer" class="segnali-list">
                <!-- I segnali vengono inseriti qui da JavaScript -->
            </div>

            <!-- Pulsante Analizza -->
            <div class="analyze-container">
                <button id="analyzeBtn" class="analyze-btn">ANALIZZA</button>
            </div>
        </main>

        <!-- Pannello Risultati (inizialmente nascosto) -->
        <div id="resultsPanel" class="results-panel hidden">
            <div class="results-header">
                <h2>Risultati Analisi</h2>
                <button id="closeResultsBtn" class="icon-btn">✕</button>
            </div>
            
            <div class="results-content">
                <!-- Pattern Principale -->
                <div class="result-card pattern-card">
                    <div class="pattern-badge" id="patternBadge">Stress Cognitivo</div>
                    <div class="pattern-score" id="patternScore">87%</div>
                    <div class="pattern-cluster" id="patternCluster">Cluster A - Regolazione Emotiva</div>
                </div>

                <!-- Intensità -->
                <div class="result-card">
                    <h3>Intensità</h3>
                    <div class="intensity-bar">
                        <div class="intensity-fill" id="intensityFill" style="width: 0%"></div>
                    </div>
                    <div class="intensity-label" id="intensityLabel">Forte (72%)</div>
                </div>

                <!-- Congruenza -->
                <div class="result-card">
                    <h3>Congruenza</h3>
                    <div class="congruenza-grid">
                        <div class="congruenza-item">
                            <span class="label">NV</span>
                            <span class="value" id="congNV">2.4</span>
                        </div>
                        <div class="congruenza-item">
                            <span class="label">PV</span>
                            <span class="value" id="congPV">1.8</span>
                        </div>
                        <div class="congruenza-item">
                            <span class="label">V</span>
                            <span class="value" id="congV">1.2</span>
                        </div>
                    </div>
                    <p id="congruenzaDesc">Dissonanza emotiva</p>
                </div>

                <!-- Direzione e Predizione -->
                <div class="result-card">
                    <h3>Direzione</h3>
                    <div class="direction-badge" id="directionBadge">↪️ Fuga</div>
                    <p id="predictionText">Tendenza all'allontanamento dalla situazione</p>
                    <div class="probability" id="probabilityBar">
                        <div class="probability-fill" style="width: 75%"></div>
                    </div>
                </div>

                <!-- Segnali Chiave -->
                <div class="result-card">
                    <h3>Segnali Chiave</h3>
                    <ul id="keySignalsList" class="key-signals">
                        <!-- Inseriti da JS -->
                    </ul>
                </div>

                <!-- Pulsanti azione -->
                <div class="result-actions">
                    <button id="exportResultBtn" class="action-btn">📤 Esporta</button>
                    <button id="newAnalysisBtn" class="action-btn primary">Nuova Analisi</button>
                </div>
            </div>
        </div>

        <!-- Modal Note -->
        <div id="noteModal" class="modal hidden">
            <div class="modal-content">
                <h3>Aggiungi Nota</h3>
                <textarea id="noteText" rows="4" placeholder="Osservazioni..."></textarea>
                <div class="modal-actions">
                    <button id="saveNoteBtn" class="modal-btn primary">Salva</button>
                    <button id="cancelNoteBtn" class="modal-btn">Annulla</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
